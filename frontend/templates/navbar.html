<!-- Smooth scrolling and enhanced styles -->
    <style>
        html {
            scroll-behavior: smooth;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .text-gradient {
            background: linear-gradient(135deg, #00f5d4 0%, #9b5de5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }


        /* FIXED: Forces all navbar links to remain clean white with an elegant hover state */
        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            transition: color 0.2s ease-in-out;
            font-size: 20px;
        }

        .navbar-nav .nav-link:hover {
            color: #ffffff !important;

        }

        .btn-nav-outline {
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            border-radius: 30px; /* Rounded pill style */
            padding: 8px 22px;
            font-weight: 500;
            transition: all 0.25s ease-in-out;
            text-decoration: none !important;
    }

    .btn-nav-outline:hover {
        background: #ffffff;
        color: #5e35a6 !important; /* Swaps text to match your navbar background */
        border-color: #ffffff;
        transform: translateY(-2px);
    }

    .navbar-brand {
     color: #9d4edd !important;
     letter-spacing: 0.3px;
    }
    .navbar-icon {
        color: #9d4edd !important;
    }

    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm text-white p-3" style="background-color: #5e35a6;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-robot me-2 navbar-icon text-gradient"></i>FinSolve Technologies
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#features">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>
                {% if not user %}
                <div class="d-flex">
                    <a href="/employees/all" class="btn btn-nav-outline me-2">Register</a>
                </div>
                <div class="d-flex">
                    <a href="/login" class="btn tn btn-nav-outline me-2">Login</a>
                </div>
                {% endif %}
                {% if user %}
                   <div class="d-flex">
                        <a href="/logout" class="btn btn-nav-outline me-2">Logout</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>
</body>
