{% extends "base.html" %}
{% block content %}

<style>
    /* Custom warm background matching the login page */
    .register-bg-wrapper {
        background-color: #F7F5F0;
        min-height: calc(100vh - 120px);
    }

    .mt-6 {
        margin-top: 4rem;
    }

    .mb-6 {
        margin-bottom: 4rem;
    }
</style>

<!-- Full-width background wrapper -->
<div class="register-bg-wrapper d-flex align-items-center w-100">
    <div class="container mt-6 mb-6">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6"> <!-- Slightly wider layout to accommodate fields neatly side-by-side -->

                <div class="card shadow border-0">
                    <div class="card-body p-5">

                        <h3 class="text-center mb-4 fw-bold">
                            Create Account
                        </h3>

                        <form id="registerForm">

                            <!-- Row 1: Name & Email -->
                            <div class="row">
                                <div class="col-md-6 form-group mb-3">
                                    <label for="name" class="form-label small text-muted">Full Name</label>
                                    <input type="text" class="form-control" id="name" placeholder="John Doe" required />
                                </div>
                                <div class="col-md-6 form-group mb-3">
                                    <label for="email" class="form-label small text-muted">Email Address</label>
                                    <input type="email" class="form-control" id="email" placeholder="john@example.com" required />
                                </div>
                            </div>

                            <!-- Row 2: Password & Job Title -->
                            <div class="row">
                                <div class="col-md-6 form-group mb-3">
                                    <label for="password" class="form-label small text-muted">Password</label>
                                    <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required />
                                </div>
                                <div class="col-md-6 form-group mb-3">
                                    <label for="job_title" class="form-label small text-muted">Job Title</label>
                                    <input type="text" class="form-control" id="job_title" placeholder="Software Engineer" required />
                                </div>
                            </div>

                            <!-- Row 3: Location & Salary -->
                            <div class="row">
                                <div class="col-md-6 form-group mb-3">
                                    <label for="location" class="form-label small text-muted">Location</label>
                                    <input type="text" class="form-control" id="location" placeholder="New York, NY" required />
                                </div>
                                <div class="col-md-6 form-group mb-3">
                                    <label for="salary" class="form-label small text-muted">Annual Salary ($)</label>
                                    <input type="number" step="0.01" class="form-control" id="salary" placeholder="85000.00" required />
                                </div>
                            </div>

                            <!-- Row 4: Leaves Balance & Leaves Taken -->
                            <div class="row">
                                <div class="col-md-6 form-group mb-3">
                                    <label for="leaves_balance" class="form-label small text-muted">Leaves Balance (Days)</label>
                                    <input type="number" class="form-control" id="leaves_balance" placeholder="20" required />
                                </div>
                                <div class="col-md-6 form-group mb-3">
                                    <label for="leaves_taken" class="form-label small text-muted">Leaves Taken (Days)</label>
                                    <input type="number" class="form-control" id="leaves_taken" placeholder="5" required />
                                </div>
                            </div>

                            <!-- Row 5: Performance Rating -->
                            <div class="form-group mb-4">
                                <label for="performance_rating" class="form-label small text-muted">Performance Rating</label>
                                <select class="form-control" id="performance_rating" required>
                                    <option value="" disabled selected>Select rating...</option>
                                    <option value="1">1 - Unsatisfactory</option>
                                    <option value="2">2 - Needs Improvement</option>
                                    <option value="3">3 - Meets Expectations</option>
                                    <option value="4">4 - Exceeds Expectations</option>
                                    <option value="5">5 - Outstanding</option>
                                </select>
                            </div>

                            <!-- Register Button -->
                            <button class="btn btn-primary w-100 py-2 mt-2" type="submit">
                                Register Employee
                            </button>

                        </form>

                        <p class="mt-4 text-center small text-muted">
                            Already registered?
                            <a href="/login" class="text-decoration-none fw-semibold">
                                Sign In
                            </a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
document
    .getElementById("registerForm")
    .addEventListener("submit", async function (e) {

    e.preventDefault();

    // Collect and format form values to match expected backend data types
    const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        job_title: document.getElementById("job_title").value,
        location: document.getElementById("location").value,
        salary: parseFloat(document.getElementById("salary").value),
        leaves_balance: parseInt(document.getElementById("leaves_balance").value, 10),
        leaves_taken: parseInt(document.getElementById("leaves_taken").value, 10),
        performance_rating: parseInt(document.getElementById("performance_rating").value, 10)
    };

    try {
        const response = await fetch("/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
            alert(data.detail || "Registration failed");
            return;
        }

        alert("Registration successful!");
        window.location.href = "/login";

    } catch (error) {
        console.error("Registration error:", error);
        alert("Something went wrong during registration");
    }
});
</script>

{% endblock %}
