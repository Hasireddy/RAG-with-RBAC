{% extends "base.html" %}
{% block content %}

<style>
    /* Premium background filling space between white navbar and brown footer */
    .register-wrapper {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        width: 100%;
    }

    /* Floating glassmorphic card design */
    .custom-register-card {
        border: none;
        border-radius: 16px;
        background: #8e98f5;
        box-shadow: 0 10px 30px rgba(62, 58, 55, 0.08) !important;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .custom-register-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(62, 58, 55, 0.12) !important;
    }

    /* Deep charcoal text color for premium readability */
    .text-dark-custom {
        color: #2c2927;
    }

    /* Section divider headers inside the card */
    .section-title-custom {
        color: #2c2927;
        font-weight: 700;
        font-size: 1.15rem;
        border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        padding-bottom: 0.4rem;
    }

    /* Bright light-grey labels for high contrast on the teal card background */
    .text-muted-custom {
        color: #e9ecef;
        font-weight: 500;
        font-size: 1rem;
    }

    /* Smaller subtitle text under main heading */
    .text-subtitle-custom {
        color: #e9ecef;
        font-weight: 400;
        font-size: 1.1rem;
    }

    /* Polished modern inputs and select dropdowns with larger text size */
    .form-control-custom, .form-select-custom {
        border: 1px solid #dcd8d3;
        border-radius: 10px;
        padding: 0.95rem 1.35rem;
        background-color: #fdfdfc;
        font-size: 1.1rem;
        transition: all 0.2s ease-in-out;
    }

    /* Styled Select Dropdown arrow */
    .form-select-custom {
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://w3.org' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%232c2927' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 1.35rem center;
        background-size: 16px 12px;
    }

    /* Remove dropdown arrow wrapper if it's a multiple select field */
    .form-select-custom[multiple] {
        background-image: none;
        padding-right: 1.35rem;
        height: auto;
    }

    .form-control-custom::placeholder {
        font-size: 1.1rem;
    }

    .form-control-custom:focus, .form-select-custom:focus {
        background-color: #ffffff;
        border-color: #8c7e74;
        box-shadow: 0 0 0 4px rgba(140, 126, 116, 0.15);
        outline: 0;
    }

    .select-tip {
        font-size: 0.85rem;
        color: #e9ecef;
        margin-top: 4px;
        display: block;
    }

    /* Action button design matching the core color theme */
    .btn-custom-action {
        background-color: #2c2927;
        color: #ffffff;
        border-radius: 10px;
        padding: 0.95rem 1.35rem;
        font-size: 1.1rem;
        font-weight: 600;
        transition: all 0.2s ease;
    }

    .btn-custom-action:hover {
        background-color: #1a1817;
        color: #ffffff;
    }

    /* Link decoration styles */
    .custom-link {
        color: #2c2927;
        text-decoration: underline;
        font-weight: 600;
    }

    .custom-link:hover {
        color: #1a1817;
    }
</style>

<div class="register-wrapper py-5 mt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card custom-register-card p-4 p-sm-5">

                    <!-- Header Section -->
                    <div class="text-center mb-5">
                        <h2 class="text-dark-custom fw-bold mb-2">Create Employee Profile</h2>
                        <p class="text-subtitle-custom">Enter credentials and workforce details below</p>
                    </div>

                    <!-- Client-Side Alert for Backend Error Handling -->
                    <div id="errorAlert" class="alert alert-danger d-none mb-4" role="alert"></div>

                    <!-- Registration Form -->
                    <form id="registerForm" action="/employees/create" method="post">

                        <!-- SECTION 1: Account Credentials -->
                        <div class="mb-4">
                            <h4 class="section-title-custom mb-3">Employee Details</h4>
                            <div class="row g-3">
                                <div class="col-12 col-sm-6">
                                    <label for="fullName" class="form-label text-muted-custom">Full Name</label>
                                    <input type="text" class="form-control form-control-custom" id="fullName" name="name" placeholder=" " required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="email" class="form-label text-muted-custom">Email Address</label>
                                    <input type="email" class="form-control form-control-custom" id="email" name="email" placeholder="firstname.lastname@fintech.com" required>
                                </div>
                                <div class="col-12">
                                    <label for="password" class="form-label text-muted-custom">Password</label>
                                    <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>
                        </div>

                        <!-- SECTION 2: Employment Information -->
                        <div class="mb-4">
                            <h4 class="section-title-custom mb-3">Job Details</h4>
                            <div class="row g-3">
                                <div class="col-12 col-sm-6">
                                    <label for="jobTitle" class="form-label text-muted-custom">Job Title</label>
                                    <input type="text" class="form-control form-control-custom" id="jobTitle" name="job_title" placeholder=" " required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="location" class="form-label text-muted-custom">Location</label>
                                    <input type="text" class="form-control form-control-custom" id="location" name="location" placeholder="city" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="companyId" class="form-label text-muted-custom">Company</label>
                                    <!-- Maps to employee.company_id integer validation -->
                                    <select class="form-select form-select-custom text-dark-custom" id="companyId" name="company_id" required>
                                        <option value="" disabled selected hidden>Select Company</option>
                                            <option value="" disabled selected hidden>
                                                Select Company
                                        </option>
                                        {% for company in companies %}
                                        <option value="{{ company.id }}">
                                            {{ company.id}}. {{company.name}}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="deptId" class="form-label text-muted-custom">Department(s)</label>
                                    <!-- Maps to employee.dept_id list validation -->
                                    <select class="form-select form-select-custom text-dark-custom" id="deptId" name="dept_id" multiple size="4" required>
                                        {% for dept in departments %}
                                        <option value="{{ dept.id }}">
                                                {{ dept.dept_name }} ({{ dept.id}})
                                        </option>
                                        {% endfor %}

                                    </select>
                                    <small class="select-tip">Hold Ctrl (Cmd on Mac) to select multiple.</small>
                                </div>
                            </div>
                        </div>

                        <!-- SECTION 3: Compensation, Attendance & Metrics -->
                        <div class="mb-5">
                            <h4 class="section-title-custom mb-3">Salary Details</h4>
                            <div class="row g-3">
                                <div class="col-12 col-sm-6">
                                    <label for="salary" class="form-label text-muted-custom">Salary</label>
                                    <input type="number" step="0.01" class="form-control form-control-custom" id="salary" name="salary" placeholder="60000" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label for="performanceRating" class="form-label text-muted-custom">Performance Rating</label>
                                    <input type="number" step="0.1" min="0" max="5" class="form-control form-control-custom" id="performanceRating" name="performance_rating" placeholder="0.0" required>
                                </div>
                                <div class="col-12 col-sm-6">
                                <label for="leavesTaken" class="form-label text-muted-custom">Leaves Taken</label>
                                <input type="number"
                                               min="0"
                                               class="form-control form-control-custom"
                                               id="leavesTaken"
                                               name="leaves_taken"
                                               placeholder="0"
                                               required>
                                </div>
                                <div class="row g-3">
                                <!-- Leaves Balance Input Field -->
                                <div class="col-12 col-sm-6 mb-5">
                                    <label for="leavesBalance" class="form-label text-muted-custom">Leaves Balance</label>
                                    <input type="number" min="0" class="form-control form-control-custom" id="leavesBalance" name="leaves_balance" placeholder="15" required>
                                </div>
                            </div>

                            <!-- Submit Action Button -->
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-custom-action">Register</button>
                            </div>

                            <!-- Account Navigation Redirect Link -->
                            <div class="text-center pt-2">
                                <span class="text-subtitle-custom">Already have an account? </span>
                                <a href="/login" class="custom-link">Log In</a>
                            </div>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
     <script>
         document.getElementById('registerForm').addEventListener('submit', async function(e) { e.preventDefault();
         const errorAlert = document.getElementById('errorAlert'); errorAlert.classList.add('d-none');
         const formData = new FormData(this); const deptSelect = document.getElementById('deptId');
         const payload = {
             emp_name: formData.get('name'), email: formData.get('email'),
             password: formData.get('password'),
             job_title: formData.get('job_title'),
             location: formData.get('location'),
             company_id: parseInt(formData.get('company_id')),
             dept_id: Array.from( deptSelect.selectedOptions ).map(option => parseInt(option.value)),
             salary: parseFloat(formData.get('salary')),
             performance_rating: parseFloat(formData.get('performance_rating')),
             leaves_taken: parseInt(formData.get('leaves_taken')),
             leaves_balance: parseInt(formData.get('leaves_balance'))
         };
         console.log("Current path:", window.location.pathname);
         console.log(payload);
         try
         {
             const response = await fetch( "/employees/create",
                 { method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify(payload)
                 } );
             const result = await response.json();
             console.log(response.status);
             if (!response.ok)
              {
                  let errorMsg = 'Something went wrong.';
                  if (typeof result.detail === 'string') { errorMsg = result.detail; }
                  else if ( Array.isArray(result.detail) && result.detail.length > 0 ) { errorMsg = result.detail[0].msg;
                  }
                  alert(errorMsg);
                  return;
              }
             alert("Employee registered successfully 🎉");
             window.location.href = "/employees/all?success=1";
              }
         catch (error)
            {
                errorAlert.textContent = error.message; errorAlert.classList.remove('d-none');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } });
     </script>

 </div>
 {% endblock %}
