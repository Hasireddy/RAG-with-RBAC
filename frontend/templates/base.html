<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        RAG with ROLE BASED ACCESS CONTROL
    </title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <link
        href="/static/style.css"
        rel="stylesheet"
    >
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
      #chat-bubble-container {
        position: fixed;
        bottom: 250px; /* INCREASED DISTANCE: Shifts the button significantly higher */
        right: 200px;
        z-index: 9999;
    }

    /* SPEECH BUBBLE INTERFACE UPDATE */
      #chat-bubble.bubble-dashboard-speech {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px 24px 4px 24px; /* Asymmetric bubble tail styling */
            padding: 14px 20px;
            display: flex !important;
            flex-direction: row !important;
            align-items: center;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: auto;
            height: auto;
        }

       #chat-bubble.bubble-dashboard-speech:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 40px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

     /* NEW: POP-UP TEXT ANIMATION ENGINE */
    .pop-up-text {
            display: flex;
            flex-direction: column;
            transform-origin: left center;
            opacity: 0;
            transform: scale(0.6) translateX(10px);
            animation: textPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
        }

    /* Keyframe step sequencing */
    @keyframes textPopIn {
        0% {
            opacity: 0;
            transform: scale(0.6) translateX(10px);
        }
        100% {
            opacity: 1;
            transform: scale(1) translateX(0);
        }
    }


    .avatar-stack {
        position: relative;
        margin-right: 12px;
        display: flex;
        align-items: center;
    }

    .stack-img {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .online-indicator-dot {
        position: absolute;
        bottom: 0px;
        right: 0px;
        width: 12px;
        height: 12px;
        background: #22c55e;
        border: 2px solid #fff;
        border-radius: 50%;
    }

    .title-top {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
            margin-bottom: 2px;
        }

        .subtitle-bottom {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
            line-height: 1.1;
            white-space: nowrap;
        }

        /* CHAT WINDOW INTERFACE */
        #chat-window {
            position: fixed;
            bottom: 150px;
            right: 50px;
            width: 500px;
            max-width: 95vw;
            height: 670px;
            background: #8e98f5;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            z-index: 9999;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
        }

        #close-chat {
            cursor: pointer;
            font-size: 20px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        #close-chat:hover {
            opacity: 1;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #8e98f5;
            display: flex;
            flex-direction: column;
        }


        /* FLOATING CHAT BUBBLE */

        /* MESSAGE STYLES */
.message {
        padding: 14px 20px;
        border-radius: 15px;
        width: 100%;
        max-width: 100%;
        font-family: 'Geist', 'SF Pro Display', -apple-system, sans-serif;
        font-weight: 300;
        font-size: 16px;
        line-height: 1.5;
        word-break: break-word;
}

.message-user {
    font-family: 'Geist', 'SF Pro Display', -apple-system, sans-serif;
    background: #58508d;
    color: white;
    border-top-right-radius: 0;
    font-size: 16px;
    font-weight: 50;
}

.message strong {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600 !important;
    font-style: italic;
    letter-spacing: 0.5px;
    color: #9d4edd;
    font-size: 15px;
}

.message-bot {
    background-color: #fdfdfc;
    color: #000;
    border-top-left-radius: 0;
}

.d-flex.mb-4 > div {
    width: 100%;
}

        /* AVATAR */
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-time {
            font-size: 16px;
            color: white;
        }
        /* FOOTER */
        .chat-footer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-top: 1px solid #ddd;
        }

        .chat-input {
            border-radius: 30px;
            padding-left: 20px;
            font-size: 18px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #8e98f5;
        }

        .typing {
            font-style: italic;
            color: gray;
        }

         /* MOBILE */
        @media(max-width: 768px) {

            #chat-window {
                width: 95%;
                right: 2.5%;
                height: 80vh;
                bottom: 90px;
            }

        }

    </style>

</head>

<body>

    {% include "navbar.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "footer.html" %}

    <!-- FLOATING BUBBLE -->
    {% if  user %}
        <div id="chat-bubble-container">
            <div id="chat-bubble" class="bubble-dashboard-speech">
                    <div class="avatar-stack">
                        <img src="/static/images/chatbot1.png" class="stack-img main" alt="AI">
                        <span class="online-indicator-dot"></span>
                    </div>
                    <div class="text-stack pop-up-text">
                        <span class="title-top">Finsight</span>
                        <span class="subtitle-bottom">How can I help you today?</span>
                    </div>
            </div>
        </div>
    {% endif %}

    <!-- CHAT WINDOW -->
    <div id="chat-window">

        <!-- HEADER -->
        <div class="chat-header d-flex align-items-center">
            <img src="/static/images/chatbot1.png" class="avatar me-2" alt="Avatar">
            <h5 class="mb-0">Finsight</h5>
            <span id="close-chat" class="ms-auto">✖</span>
        </div>

        <!-- BODY -->
        <div class="chat-body" id="chatBody">

            <!-- WELCOME MESSAGE -->
            <div class="d-flex mb-4">

                <img
                    src="/static/images/chatbot1.png"
                    class="avatar me-2"
                >

                <div>

                    <div class="message message-bot">
                        Hi! 😊. I'm <strong> Finsight, your enterprise support AI.</strong> How can I assist you today?
                    </div>

                    <div class="chat-time ms-2">
                        Just now
                    </div>

                </div>

            </div>

        </div>

        <!-- FOOTER -->
        <div class="chat-footer">

            <div class="d-flex align-items-center">

                <input
                    type="text"
                    id="messageInput"
                    class="form-control chat-input me-2"
                    placeholder="Type your message..."
                >

                <button
                    class="btn btn-primary send-btn"
                    id="sendBtn"
                >
                    <i class="fas fa-paper-plane"></i>
                </button>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
    ></script>

    <script src="/static/js/script.js"></script>

    <script>

        const chatBubble =
            document.getElementById("chat-bubble");

        const chatWindow =
            document.getElementById("chat-window");

        const closeChat =
            document.getElementById("close-chat");

        const sendBtn =
            document.getElementById("sendBtn");

        const messageInput =
            document.getElementById("messageInput");

        const chatBody =
            document.getElementById("chatBody");

        /* OPEN CHAT */
        chatBubble.addEventListener("click", () => {

            chatWindow.style.display = "flex";
        });

        /* CLOSE CHAT */
        closeChat.addEventListener("click", () => {

            chatWindow.style.display = "none";
        });

        /* TIME */
        function getCurrentTime() {

            return new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }
         /* HTML-escape untrusted text before injecting it into the DOM (XSS-safe) */
        function appendUserMessage(message) {
            const wrapper = document.createElement("div");
            wrapper.className = "d-flex mb-4";
            wrapper.innerHTML = `
                <img src="/static/images/user.png" class="avatar ms-2" alt="User">
                <div class="ms-2" style="max-width: 80%;">
                    <div class="message message-user"></div>
                    <div class="chat-time text-end me-2">${getCurrentTime()}</div>
                </div>

            `;
            wrapper.querySelector(".message-user").textContent = message;
            chatBody.appendChild(wrapper);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        /* BOT PLACEHOLDER CONTAINER CREATION */
        function createBotPlaceholder() {
            const wrapper = document.createElement("div");
            wrapper.className = "d-flex mb-4";
            wrapper.innerHTML = `
                <img src="/static/images/chatbot1.png" class="avatar me-2">
                <div style="max-width: 80%;">
                    <div class="message message-bot streaming-target"></div>
                    <div class="chat-time ms-2">${getCurrentTime()}</div>
                </div>
            `;
            chatBody.appendChild(wrapper);
            chatBody.scrollTop = chatBody.scrollHeight;
            return wrapper.querySelector(".streaming-target");
        }

        /* ACTIONS */
        async function handleSendMessage() {
            const queryText = messageInput.value.trim();
            if (!queryText) return;

            appendUserMessage(queryText);
            messageInput.value = "";

            const targetBubble = createBotPlaceholder();
            targetBubble.textContent = "● ● ●"; // Temporary loading visual anchor
            const token = localStorage.getItem("token")
            try {
                const response = await fetch("/chatbot/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" , "Authorization":`Bearer ${token}`},
                    body: JSON.stringify({ query: queryText })
                });

                if (!response.ok) {
                    const errorBody = await response.json();
                    throw new Error(errorBody.detail || "Server error experienced during processing.");
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let streamBuffer = "";
                let contentStarted = false;

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    streamBuffer += decoder.decode(value, { stream: true });
                    const discreteLines = streamBuffer.split("\n");

                    // Retain unparsed residual segment inside buffer
                    streamBuffer = discreteLines.pop();

                    for (const row of discreteLines) {
                        const directRowData = row.trim();
                        if (!directRowData || !directRowData.startsWith("data: ")) continue;

                        if (!contentStarted) {
                            targetBubble.textContent = "";
                            contentStarted = true;
                        }

                        const cleanJsonString = directRowData.replace(/^data:\s*/, "");
                        try {
                            const parsedData = JSON.parse(cleanJsonString);

                            if (parsedData.token) {
                                targetBubble.textContent += parsedData.token;
                            } else if (parsedData.error_type) {
                                targetBubble.textContent = parsedData.answer;
                                if (parsedData.error_type === "UNAUTHORIZED") {
                                    targetBubble.classList.add("text-danger");
                                }
                            }
                            chatBody.scrollTop = chatBody.scrollHeight;
                        } catch (jsonErr) {
                            console.warn("Skipped dynamic packet parsing anomalies:", cleanJsonString);
                        }
                    }
                }
            } catch (err) {
                console.error(err);
                targetBubble.classList.add("text-danger");
                targetBubble.textContent = err.message || "A network transaction disconnect occurred.";
            } finally {
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }

        sendBtn.addEventListener("click", handleSendMessage);
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                handleSendMessage();
            }
        });

    </script>

</body>
</html>
