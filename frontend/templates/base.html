<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        RAG with ROLE BASED ACCESS CONTROL
    </title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <link
        href="/static/style.css"
        rel="stylesheet"
    >

    <style>

        /* FLOATING CHAT BUBBLE */
     #chat-bubble {
        position: fixed;
        bottom: 180px;
        right: 70px;
        width: 80px;
        height: 75px;
        background: #0d6efd;
        color: white;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        z-index: 9999;
        transition: 0.3s;
    }

        #chat-bubble:hover {
            transform: scale(1.08);
        }

        /* CHAT WINDOW */
        #chat-window {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 600px;
            max-width: 95vw;
            height: 650px;

            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-radius: 20px;
            overflow: hidden;

            display: none;
            flex-direction: column;

            box-shadow: 0 5px 25px rgba(0,0,0,0.3);

            z-index: 9999;
        }

        /* HEADER */
        .chat-header {
            background: #0d6efd;
            color: white;
            padding: 15px 20px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h5 {
            margin: 0;
        }

        #close-chat {
            cursor: pointer;
            font-size: 20px;
        }

        /* CHAT BODY */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        /* MESSAGE STYLES */
         .message {
    padding: 14px 20px;
    border-radius: 15px;
    width: 100%;
    max-width: 100%;
    font-size: 16px;
    line-height: 1.5;
    word-break: break-word;
}

.message-user {
    background-color: #0d6efd;
    color: white;
    border-top-right-radius: 0;
}

.message-bot {
    background-color: #f1f3f5;
    color: #000;
    border-top-left-radius: 0;
}

.d-flex.mb-4 > div {
    width: 100%;
}

        /* AVATAR */
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-time {
            font-size: 12px;
            color: gray;
        }

        /* FOOTER */
        .chat-footer {
            background: white;
            padding: 15px;
            border-top: 1px solid #ddd;
        }

        .chat-input {
            border-radius: 30px;
            padding-left: 20px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .typing {
            font-style: italic;
            color: gray;
        }

        /* MOBILE */
        @media(max-width: 768px) {

            #chat-window {
                width: 95%;
                right: 2.5%;
                height: 80vh;
                bottom: 90px;
            }

        }

    </style>

</head>

<body>

    {% include "navbar.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "footer.html" %}

    <!-- FLOATING BUBBLE -->
    {% if  user %}
    <div id="chat-bubble">
        💬
    </div>
    {% endif %}

    <!-- CHAT WINDOW -->
    <div id="chat-window">

        <!-- HEADER -->
        <div class="chat-header">

            <h5>
                AI Chatbot
            </h5>

            <span id="close-chat">
                ✖
            </span>

        </div>

        <!-- BODY -->
        <div class="chat-body" id="chatBody">

            <!-- WELCOME MESSAGE -->
            <div class="d-flex mb-4">

                <img
                    src="/static/images/chatbot1.png"
                    class="avatar me-2"
                >

                <div>

                    <div class="message message-bot">
                        Hello 👋 Ask me anything.
                    </div>

                    <div class="chat-time ms-2">
                        Just now
                    </div>

                </div>

            </div>

        </div>

        <!-- FOOTER -->
        <div class="chat-footer">

            <div class="d-flex align-items-center">

                <input
                    type="text"
                    id="messageInput"
                    class="form-control chat-input me-2"
                    placeholder="Type your message..."
                >

                <button
                    class="btn btn-primary send-btn"
                    id="sendBtn"
                >
                    <i class="fas fa-paper-plane"></i>
                </button>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
    ></script>

    <script src="/static/js/script.js"></script>

    <script>

        const chatBubble =
            document.getElementById("chat-bubble");

        const chatWindow =
            document.getElementById("chat-window");

        const closeChat =
            document.getElementById("close-chat");

        const sendBtn =
            document.getElementById("sendBtn");

        const messageInput =
            document.getElementById("messageInput");

        const chatBody =
            document.getElementById("chatBody");

        /* OPEN CHAT */
        chatBubble.addEventListener("click", () => {

            chatWindow.style.display = "flex";
        });

        /* CLOSE CHAT */
        closeChat.addEventListener("click", () => {

            chatWindow.style.display = "none";
        });

        /* TIME */
        function getCurrentTime() {

            return new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }
         /* HTML-escape untrusted text before injecting it into the DOM (XSS-safe) */
        function escapeHtml(value) {
            const div = document.createElement("div");
            div.textContent = value == null ? "" : String(value);
            return div.innerHTML;
        }
        /* Extract a human-readable error message from a FastAPI error body */
        function extractErrorMessage(data) {
            if (!data) {
                return "Something went wrong. Please try again.";
            }
            // HTTPException -> { "detail": "..." }
            if (typeof data.detail === "string") {
                return data.detail;
            }
            // Request validation errors -> { "detail": [{ "msg": "..." }] }
            if (Array.isArray(data.detail) && data.detail[0]?.msg) {
                return data.detail[0].msg;
            }
            return "Something went wrong. Please try again.";
        }

        /* USER MESSAGE */
        function appendUserMessage(message) {

            const html = `
                <div class="d-flex justify-content-end mb-4">

                    <div class="text-end">

                        <div class="message message-user ms-auto">
                            ${message}
                        </div>

                        <div class="chat-time me-2">
                            ${getCurrentTime()}
                        </div>

                    </div>

                    <img
                        src="/static/images/user.png"
                        class="avatar ms-2"
                    >

                </div>
            `;

            chatBody.insertAdjacentHTML(
                "beforeend",
                html
            );
        }

        /* BOT MESSAGE */
        function appendBotMessage(message) {

            const html = `
                <div class="d-flex mb-4">

                    <img
                        src="/static/images/chatbot1.png"
                        class="avatar me-2"
                    >

                    <div>

                        <div class="message message-bot">
                            ${message}
                        </div>

                        <div class="chat-time ms-2">
                            ${getCurrentTime()}
                        </div>

                    </div>

                </div>
            `;

            chatBody.insertAdjacentHTML(
                "beforeend",
                html
            );
        }

        /* SEND MESSAGE */
        async function sendMessage() {

            const message =
                messageInput.value.trim();

            if (!message) return;

            appendUserMessage(message);

            messageInput.value = "";

            chatBody.scrollTop =
                chatBody.scrollHeight;

            try {

                const typingId =
                    "typing-message";

                chatBody.insertAdjacentHTML(
                    "beforeend",
                    `
                    <div
                        class="d-flex mb-4"
                        id="${typingId}"
                    >

                        <img
                            src="/static/images/chatbot1.png"
                            class="avatar me-2"
                        >

                        <div>

                            <div class="message message-bot typing">
                                Typing...
                            </div>

                        </div>

                    </div>
                    `
                );

               const token = localStorage.getItem("token");
                console.log("token", token)

                 const response = await fetch("/chatbot/", {
                            method: "POST",
                            headers: {
                              "Content-Type": "application/json",
                               "Authorization": `Bearer ${token}`
                            },
                            body: JSON.stringify({
                              query: message,
                            })
                          });
                const data =
                    await response.json();
                document
                    .getElementById("typing-message")
                    ?.remove();
                // Surface backend errors (4xx/5xx) to the user in the chat.
                if (!response.ok) {
                    appendBotMessage(
                        escapeHtml(extractErrorMessage(data))
                    );
                    chatBody.scrollTop = chatBody.scrollHeight;
                    return;
                }
                if (data.session_id) {
                    localStorage.setItem(
                        "chat_session_id",
                        data.session_id,
                    )
                }
                appendBotMessage(
                    data.messages?.[0]?.message?.content ||
                    data.messages?.[0]?.message?.["answer"] ||
                    data.response ||
                    "No response generated."
                );

            } catch (error) {

                console.error(error);

                document
                    .getElementById("typing-message")
                    ?.remove();

                appendBotMessage(
                    "Server error occurred."
                );
            }

            chatBody.scrollTop =
                chatBody.scrollHeight;
        }

        /* SEND BUTTON */
        sendBtn.addEventListener(
            "click",
            sendMessage
        );

        /* ENTER KEY */
        messageInput.addEventListener(
            "keypress",
            function (e) {

                if (e.key === "Enter") {
                    sendMessage();
                }
            }
        );

    </script>

</body>
</html>
