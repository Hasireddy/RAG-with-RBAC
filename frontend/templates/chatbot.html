
{% extends "base.html" %}
{% block content %}

  <style>
    body {
       background: linear-gradient(135deg, #667eea, #764ba2);
       min-height: 100vh;
       margin-top:5%;
      }

    .chat-card {
          height: 700px;
          border-radius: 20px;
          overflow: hidden;
          width: 100%;
          max-width: 1400px;

          /* Glassmorphism */
           background: rgba(255, 255, 255, 0.2);
           backdrop-filter: blur(15px);
           -webkit-backdrop-filter: blur(15px);
          }

    .chat-body {
        height: 580px;
        overflow-y: auto;
        padding: 20px;
        background: #fff;
        display: flex;
        flex-direction: column;
    }

   .message {
    padding: 14px 20px;
    border-radius: 15px;
    width: 100%;
    max-width: 100%;
    font-size: 16px;
    line-height: 1.5;
    word-break: break-word;
}

.message-user {
    background-color: #0d6efd;
    color: white;
    border-top-right-radius: 0;
}

.message-bot {
    background-color: #f1f3f5;
    color: #000;
    border-top-left-radius: 0;
}

.d-flex.mb-4 > div {
    width: 100%;
}

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .chat-time {
      font-size: 12px;
      color: gray;
    }

    .chat-input {
      border-radius: 30px;
      padding-left: 20px;
    }

    .send-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
    }

    .typing {
      font-style: italic;
      color: gray;
    }
  </style>

<div class="container-fluid py-5">

  <div class="row justify-content-center">

    <div class="col-12 col-lg-11 col-xl-10">

      <div class="card shadow border-0 chat-card">

        <!-- Header -->
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
          <h5 class="mb-0">AI Chatbot</h5>

          <span class="badge bg-light text-dark">Online</span>
        </div>

        <!-- Chat Body -->
        <div class="chat-body" id="chatBody">

          <!-- Bot Welcome -->
          <div class="d-flex mb-4">

            <img src="/static/images/chatbot1.png" class="avatar me-2">

            <div>

              <div class="message message-bot">
                  Hello 👋 Ask me anything.
              </div>

              <div class="chat-time ms-2">
                Just now
              </div>

            </div>

          </div>

        </div>

        <!-- Footer -->
        <div class="card-footer bg-white border-0 p-3">

          <div class="d-flex align-items-center">

            <input
              type="text"
              id="messageInput"
              class="form-control chat-input me-2"
              placeholder="Type your message..."
            >

            <button class="btn btn-primary send-btn" id="sendBtn">
              <i class="fas fa-paper-plane"></i>
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>
  const sendBtn = document.getElementById("sendBtn");
  const messageInput = document.getElementById("messageInput");
  const chatBody = document.getElementById("chatBody");

  function getCurrentTime() {
    return new Date().toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  // USER MESSAGE
  function appendUserMessage(message) {
    const html = `
      <div class="d-flex justify-content-end mb-4">

        <div class="text-end">

          <div class="message message-user ms-auto">
            ${message}
          </div>

          <div class="chat-time me-2">
            ${getCurrentTime()}
          </div>

        </div>

        <img src="/static/images/user.png" class="avatar ms-2">

      </div>
    `;

    chatBody.insertAdjacentHTML("beforeend", html);
  }

  // BOT MESSAGE
  function appendBotMessage(message) {
    const html = `
      <div class="d-flex mb-4">

        <img src="/static/images/chatbot1.png" class="avatar me-2">

        <div>

          <div class="message message-bot">
            ${message}
          </div>

          <div class="chat-time ms-2">
            ${getCurrentTime()}
          </div>

        </div>

      </div>
    `;

    chatBody.insertAdjacentHTML("beforeend", html);
  }

  // SEND MESSAGE
  async function sendMessage() {

    const message = messageInput.value.trim();
    if (!message) return;

    appendUserMessage(message);
    messageInput.value = "";

    chatBody.scrollTop = chatBody.scrollHeight;

    try {

      // typing indicator (safe id)
      const typingId = "typing-message";

      chatBody.insertAdjacentHTML("beforeend", `
        <div class="d-flex mb-4" id="${typingId}">
          <img src="/static/images/chatbot1.png" class="avatar me-2">

          <div>
            <div class="message message-bot typing">
              Typing...
            </div>
          </div>
        </div>
      `);
      const token = localStorage.getItem("token");
      console.log("token", token)

      const response = await fetch("/chatbot/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
           "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({
          query: message
        })
      });
      console.log(response.status)

      const data = await response.json();
      console.log(data);

      // remove typing safely
      document.getElementById("typing-message")?.remove();
      appendBotMessage(
        data.messages?.[0]?.message||
        data.response

      );

    } catch (error) {

      console.error(error);

      document.getElementById("typing-message")?.remove();

      appendBotMessage("Server error occurred.");
    }

    chatBody.scrollTop = chatBody.scrollHeight;
  }

  sendBtn.addEventListener("click", sendMessage);

  messageInput.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });

</script>

{% endblock %}
